# =============================================
# SIGPRO Backend - Oracle con Wallet
# =============================================

# Servidor
server.port=8080

# Oracle DataSource con Wallet (TNS_ADMIN apunta al directorio del wallet)
# Ajusta el alias del servicio (ej: mydb_high) según tu tnsnames.ora
/* aqui va el alias del servicio de la base de datos */
spring.datasource.url=jdbc:oracle:thin:@${ORACLE_TNS_ALIAS:dbname_high}?TNS_ADMIN=src/main/resources/wallet
spring.datasource.username=${ORACLE_USER:usuario} /* aqui va el usuario de la base de datos */
spring.datasource.password=${ORACLE_PASSWORD:password} /* aqui va la contraseña de la base de datos */
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Opcional: si el wallet está en otra ruta absoluta (ej. en producción)
# spring.datasource.url=jdbc:oracle:thin:@dbname_high?TNS_ADMIN=${ORACLE_WALLET_PATH}
